<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玩具端预览 - 智能体形象展示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: #1a1a1a;
            color: white;
            overflow: hidden;
        }

        .toy-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #2a2a2a 0%, #1a1a1a 100%);
        }

        .toy-screen {
            width: 320px;
            height: 480px;
            background: #000;
            border-radius: 20px;
            border: 8px solid #333;
            position: relative;
            overflow: hidden;
            box-shadow: 
                0 0 20px rgba(79, 172, 254, 0.3),
                inset 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .screen-content {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: all 0.5s ease;
        }

        .avatar-expression {
            max-width: 150px;
            max-height: 150px;
            border-radius: 15px;
            border: 3px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .status-indicator {
            position: absolute;
            top: 15px;
            left: 15px;
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 12px;
            backdrop-filter: blur(10px);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse 2s infinite;
        }

        .status-listening .status-dot {
            background: #4facfe;
        }

        .status-speaking .status-dot {
            background: #00f2fe;
        }

        .status-idle .status-dot {
            background: #888;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.2); }
        }

        .wave-animation {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(79, 172, 254, 0.3) 25%, 
                rgba(0, 242, 254, 0.3) 50%, 
                rgba(79, 172, 254, 0.3) 75%, 
                transparent 100%);
            animation: wave 3s ease-in-out infinite;
            opacity: 0;
        }

        .wave-animation.active {
            opacity: 1;
        }

        @keyframes wave {
            0%, 100% { transform: translateX(-100%); }
            50% { transform: translateX(100%); }
        }

        .control-panel {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px 25px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .control-btn {
            background: linear-gradient(45deg, #4facfe 0%, #00f2fe 100%);
            border: none;
            color: white;
            padding: 12px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.3s ease;
            min-width: 70px;
        }

        .control-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(79, 172, 254, 0.4);
        }

        .control-btn.active {
            background: linear-gradient(45deg, #00f2fe 0%, #4facfe 100%);
            box-shadow: 0 0 20px rgba(79, 172, 254, 0.6);
        }

        .demo-text {
            position: absolute;
            bottom: 80px;
            left: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.8);
            padding: 12px 15px;
            border-radius: 15px;
            font-size: 11px;
            line-height: 1.4;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
        }

        .demo-text.show {
            opacity: 1;
            transform: translateY(0);
        }

        .fullscreen-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            border: none;
            color: white;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .fullscreen-toggle:hover {
            background: rgba(79, 172, 254, 0.7);
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            border: none;
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(79, 172, 254, 0.7);
        }

        .loading-screen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .loading-screen.show {
            opacity: 1;
            pointer-events: all;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(79, 172, 254, 0.3);
            border-top: 3px solid #4facfe;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 12px;
            color: #4facfe;
        }

        .info-panel {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 10px 20px;
            border-radius: 15px;
            font-size: 12px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .placeholder-content {
            text-align: center;
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }

        .placeholder-icon {
            font-size: 48px;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        @media (max-width: 480px) {
            .toy-screen {
                width: 280px;
                height: 420px;
            }
            
            .control-panel {
                bottom: 20px;
                padding: 12px 20px;
            }
            
            .control-btn {
                padding: 10px 15px;
                font-size: 11px;
                min-width: 60px;
            }
        }
    </style>
</head>
<body>
    <div class="toy-container">
        <button class="back-btn" onclick="goBack()">← 返回管理</button>
        <button class="fullscreen-toggle" onclick="toggleFullscreen()" title="全屏预览">⛶</button>
        
        <div class="info-panel">
            <span id="agent-info">智能体形象预览 - 实时演示</span>
        </div>

        <div class="toy-screen">
            <div class="screen-content" id="screen-content">
                <div class="placeholder-content">
                    <div class="placeholder-icon">🤖</div>
                    <div>智能体形象加载中...</div>
                    <div style="font-size: 11px; margin-top: 8px; opacity: 0.7;">
                        请在形象管理页面上传资源
                    </div>
                </div>
            </div>

            <div class="status-indicator status-listening" id="status-indicator">
                <div class="status-dot"></div>
                <span id="status-text">聆听中</span>
            </div>

            <div class="wave-animation" id="wave-animation"></div>

            <div class="demo-text" id="demo-text">
                智能体正在聆听您的问题，请开始说话...
            </div>

            <div class="loading-screen" id="loading-screen">
                <div class="loading-spinner"></div>
                <div class="loading-text">正在加载形象资源...</div>
            </div>
        </div>

        <div class="control-panel">
            <button class="control-btn active" onclick="switchState('listening')">聆听模式</button>
            <button class="control-btn" onclick="switchState('speaking')">回答模式</button>
            <button class="control-btn" onclick="switchState('idle')">待机模式</button>
            <button class="control-btn" onclick="simulateLoading()">模拟加载</button>
        </div>
    </div>

    <script>
        // 全局状态
        const toyState = {
            currentState: 'listening',
            resources: {
                background: null,
                listening: null,
                speaking: null,
                idle: null,
                loading: null
            },
            isFullscreen: false
        };

        // 状态配置
        const stateConfig = {
            listening: {
                text: '智能体正在聆听您的问题，请开始说话...',
                statusText: '聆听中',
                statusClass: 'status-listening',
                showWave: true
            },
            speaking: {
                text: '智能体正在为您回答问题，请稍等...',
                statusText: '回答中',
                statusClass: 'status-speaking',
                showWave: true
            },
            idle: {
                text: '智能体处于待机状态，随时为您服务',
                statusText: '待机中',
                statusClass: 'status-idle',
                showWave: false
            }
        };

        // 初始化页面
        function initToyPreview() {
            // 从localStorage获取上传的资源（模拟从形象管理页面传递的数据）
            loadResourcesFromStorage();
            
            // 设置初始状态
            switchState('listening');
            
            // 模拟定期状态切换（演示效果）
            startDemoMode();
        }

        // 从存储加载资源
        function loadResourcesFromStorage() {
            try {
                const savedResources = localStorage.getItem('avatarResources');
                if (savedResources) {
                    toyState.resources = JSON.parse(savedResources);
                    updateScreenContent();
                }
            } catch (error) {
                console.log('No saved resources found');
            }
        }

        // 切换状态
        function switchState(newState) {
            toyState.currentState = newState;
            const config = stateConfig[newState];
            
            // 更新控制按钮
            document.querySelectorAll('.control-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event?.target?.classList.add('active');
            
            // 更新状态指示器
            const statusIndicator = document.getElementById('status-indicator');
            statusIndicator.className = `status-indicator ${config.statusClass}`;
            document.getElementById('status-text').textContent = config.statusText;
            
            // 更新演示文本
            const demoText = document.getElementById('demo-text');
            demoText.textContent = config.text;
            demoText.classList.add('show');
            
            // 控制波浪动画
            const waveAnimation = document.getElementById('wave-animation');
            if (config.showWave) {
                waveAnimation.classList.add('active');
            } else {
                waveAnimation.classList.remove('active');
            }
            
            // 更新屏幕内容
            updateScreenContent();
            
            // 3秒后隐藏文本
            setTimeout(() => {
                demoText.classList.remove('show');
            }, 3000);
        }

        // 更新屏幕内容
        function updateScreenContent() {
            const screenContent = document.getElementById('screen-content');
            const background = toyState.resources.background;
            const expression = toyState.resources[toyState.currentState];
            
            if (background) {
                screenContent.style.backgroundImage = `url(${background})`;
                screenContent.innerHTML = '';
                
                if (expression) {
                    const expressionImg = document.createElement('img');
                    expressionImg.src = expression;
                    expressionImg.className = 'avatar-expression';
                    expressionImg.alt = `${toyState.currentState} expression`;
                    screenContent.appendChild(expressionImg);
                }
            } else if (expression) {
                screenContent.style.backgroundImage = 'none';
                screenContent.innerHTML = `<img src="${expression}" class="avatar-expression" alt="${toyState.currentState} expression">`;
            } else {
                // 显示占位内容
                screenContent.style.backgroundImage = 'none';
                screenContent.innerHTML = `
                    <div class="placeholder-content">
                        <div class="placeholder-icon">${getStateIcon(toyState.currentState)}</div>
                        <div>${getStatePlaceholderText(toyState.currentState)}</div>
                        <div style="font-size: 11px; margin-top: 8px; opacity: 0.7;">
                            请在形象管理页面上传对应资源
                        </div>
                    </div>
                `;
            }
        }

        // 获取状态图标
        function getStateIcon(state) {
            const icons = {
                listening: '🎧',
                speaking: '💬',
                idle: '😴'
            };
            return icons[state] || '🤖';
        }

        // 获取状态占位文本
        function getStatePlaceholderText(state) {
            const texts = {
                listening: '聆听表情未配置',
                speaking: '回答表情未配置',
                idle: '待机表情未配置'
            };
            return texts[state] || '表情未配置';
        }

        // 模拟加载
        function simulateLoading() {
            const loadingScreen = document.getElementById('loading-screen');
            loadingScreen.classList.add('show');
            
            // 模拟加载时间
            setTimeout(() => {
                loadingScreen.classList.remove('show');
                
                // 加载完成后随机切换到一个状态
                const states = ['listening', 'speaking', 'idle'];
                const randomState = states[Math.floor(Math.random() * states.length)];
                switchState(randomState);
                
                // 更新对应的按钮状态
                document.querySelectorAll('.control-btn').forEach((btn, index) => {
                    btn.classList.remove('active');
                    if (index === states.indexOf(randomState)) {
                        btn.classList.add('active');
                    }
                });
            }, 2000);
        }

        // 全屏切换
        function toggleFullscreen() {
            if (!toyState.isFullscreen) {
                document.documentElement.requestFullscreen?.() ||
                document.documentElement.webkitRequestFullscreen?.() ||
                document.documentElement.msRequestFullscreen?.();
                toyState.isFullscreen = true;
            } else {
                document.exitFullscreen?.() ||
                document.webkitExitFullscreen?.() ||
                document.msExitFullscreen?.();
                toyState.isFullscreen = false;
            }
        }

        // 返回管理页面
        function goBack() {
            // 保存当前状态到localStorage（模拟数据传递）
            localStorage.setItem('toyPreviewState', JSON.stringify(toyState));
            window.location.href = 'avatar-management.html';
        }

        // 启动演示模式
        function startDemoMode() {
            let demoIndex = 0;
            const demoStates = ['listening', 'speaking', 'idle'];
            
            setInterval(() => {
                // 每10秒自动切换状态（仅在没有用户交互时）
                if (Date.now() - (window.lastUserInteraction || 0) > 8000) {
                    demoIndex = (demoIndex + 1) % demoStates.length;
                    switchState(demoStates[demoIndex]);
                    
                    // 更新按钮状态
                    document.querySelectorAll('.control-btn').forEach((btn, index) => {
                        btn.classList.remove('active');
                        if (index === demoIndex) {
                            btn.classList.add('active');
                        }
                    });
                }
            }, 10000);
        }

        // 记录用户交互时间
        document.addEventListener('click', () => {
            window.lastUserInteraction = Date.now();
        });

        // 监听全屏变化
        document.addEventListener('fullscreenchange', () => {
            toyState.isFullscreen = !!document.fullscreenElement;
        });

        // 页面初始化
        document.addEventListener('DOMContentLoaded', initToyPreview);

        // 模拟接收来自形象管理页面的数据
        window.addEventListener('message', (event) => {
            if (event.data.type === 'updateResources') {
                toyState.resources = event.data.resources;
                updateScreenContent();
            }
        });
    </script>
</body>
</html>
